<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Cloud Exam Lab - Master certification exams with professional practice tests" />
    <meta name="theme-color" content="#0A2540" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cloud Exam Lab" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Cloud Exam Lab - Master Your Certification Exams</title>
    
    <!-- Single Page Apps for GitHub Pages -->
    <script>
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Pre-React loading shell — replaced once JS hydrates -->
      <div id="preload-shell" style="position:fixed;inset:0;background:linear-gradient(135deg,#0A2540 0%,#1A3B5C 100%);display:flex;align-items:center;justify-content:center;z-index:9999;">
        <div style="text-align:center;color:white;">
          <div style="width:4rem;height:4rem;border-radius:9999px;border:3px solid transparent;border-bottom-color:#00D4AA;animation:_pl-spin 0.8s linear infinite;margin:0 auto 1rem;"></div>
          <p style="font-size:0.9375rem;opacity:0.7;margin:0;">Loading&hellip;</p>
        </div>
      </div>
      <style>@keyframes _pl-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
