    <!-- Single Page Apps for GitHub Pages -->
    <script>
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <style>html,body{margin:0;background:#0A2540}</style>

  <body>
    <div id="root">
      <!-- Pre-React loading shell — branded animated splash, replaced once JS hydrates.
           Matches the iOS launch image so the handoff is seamless (no black flash). -->
      <div id="preload-shell">
        <div class="_pl-stage">
          <span class="_pl-glow"></span>
          <span class="_pl-tile">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path class="_pl-cloud" pathLength="100"
                    d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"
                    fill="none" stroke="#FFFFFF" stroke-width="1.6"
                    stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
        </div>
        <p class="_pl-word">Cloud Exam Lab</p>
        <div class="_pl-bar"><span></span></div>
      </div>
      <style>
        #preload-shell{position:fixed;inset:0;z-index:9999;
          background:linear-gradient(135deg,#0A2540 0%,#1A3B5C 100%);
          display:flex;flex-direction:column;align-items:center;justify-content:center;
          font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
        #preload-shell ._pl-stage{position:relative;display:flex;align-items:center;justify-content:center;
          animation:_pl-float 3s ease-in-out infinite;}
        #preload-shell ._pl-glow{position:absolute;width:9rem;height:9rem;border-radius:9999px;
          background:radial-gradient(circle,rgba(0,212,170,0.45) 0%,rgba(0,212,170,0) 70%);
          animation:_pl-pulse 2.4s ease-in-out infinite;}
        #preload-shell ._pl-tile{position:relative;width:5rem;height:5rem;border-radius:1.35rem;
          background:linear-gradient(135deg,#00D4AA 0%,#00A884 100%);
          display:flex;align-items:center;justify-content:center;
          box-shadow:0 20px 45px rgba(0,0,0,0.4);animation:_pl-in 0.6s ease-out both;}
        #preload-shell ._pl-tile svg{width:3.1rem;height:3.1rem;display:block;}
        #preload-shell ._pl-cloud{stroke-dasharray:100;animation:_pl-draw 2.4s ease-in-out infinite;}
        #preload-shell ._pl-word{margin:1.5rem 0 0;color:#fff;font-size:1rem;font-weight:700;
          letter-spacing:-0.01em;opacity:0;animation:_pl-fade 0.6s ease-out 0.35s forwards;}
        #preload-shell ._pl-bar{margin-top:0.85rem;width:7.5rem;height:3px;border-radius:9999px;
          background:rgba(255,255,255,0.12);overflow:hidden;}
        #preload-shell ._pl-bar span{display:block;width:40%;height:100%;border-radius:9999px;
          background:linear-gradient(90deg,#00D4AA,#00E8BC);animation:_pl-slide 1.3s ease-in-out infinite;}
        @keyframes _pl-draw{0%{stroke-dashoffset:100}55%{stroke-dashoffset:0}100%{stroke-dashoffset:-100}}
        @keyframes _pl-float{0%,100%{transform:translateY(-5px)}50%{transform:translateY(5px)}}
        @keyframes _pl-pulse{0%,100%{transform:scale(0.85);opacity:0.6}50%{transform:scale(1.15);opacity:1}}
        @keyframes _pl-in{0%{transform:scale(0.6);opacity:0}100%{transform:scale(1);opacity:1}}
        @keyframes _pl-fade{to{opacity:0.92}}
        @keyframes _pl-slide{0%{transform:translateX(-120%)}100%{transform:translateX(320%)}}
        @media (prefers-reduced-motion:reduce){
          #preload-shell ._pl-stage,#preload-shell ._pl-glow,#preload-shell ._pl-cloud,
          #preload-shell ._pl-tile,#preload-shell ._pl-bar span{animation:none}
          #preload-shell ._pl-cloud{stroke-dashoffset:0}
          #preload-shell ._pl-word{opacity:0.92;animation:none}
        }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
